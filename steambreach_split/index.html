<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>STEAMBREACH</title>
    <style>
      /* Expose safe area insets as CSS variables for JS access */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
      }
      
      * { box-sizing: border-box; }
      
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        height: 100%;
        width: 100%;
        background: #0a0a0a;
        /* Prevent pull-to-refresh and bounce on iOS */
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      
      #root {
        height: 100%;
        width: 100%;
        /* Safe area padding for notch/home indicator */
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
        padding-left: env(safe-area-inset-left, 0px);
        padding-right: env(safe-area-inset-right, 0px);
      }
      
      /* Prevent text selection on game UI (but allow in terminal) */
      button, [data-no-select] {
        -webkit-user-select: none;
        user-select: none;
      }
      
      /* Hide scrollbars on mobile quick bar */
      .quickbar-scroll::-webkit-scrollbar { display: none; }
      
      /* Prevent iOS zoom on input focus */
      input, textarea, select {
        font-size: 16px !important; /* iOS won't zoom if >= 16px */
      }
      
      @media (min-width: 769px) {
        input, textarea, select {
          font-size: inherit !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
